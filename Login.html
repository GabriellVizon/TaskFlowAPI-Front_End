<html class="dark" lang="pt-BR"><head>

                    "secondary-fixed": "#e2e2e2",
                    "primary-fixed-dim": "#c6c6c6",
                    "on-secondary-fixed-variant": "#454747",
                    "on-secondary-fixed": "#1a1c1c",
                    "error": "#ffb4ab",
                    "on-surface-variant": "#cfc4c5",
                    "tertiary": "#c8c6c5",
                    "surface-container-highest": "#343535",
                    "tertiary-container": "#000000",
                    "background": "#121414",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "inverse-on-surface": "#303031",
                    "surface-bright": "#383939",
                    "surface-variant": "#343535",
                    "primary-container": "#000000",
                    "surface-container-low": "#1b1c1c",
                    "surface": "#121414",
                    "on-tertiary-fixed-variant": "#474746",
                    "on-secondary-container": "#b4b5b5",
                    "secondary-container": "#454747",
                    "outline": "#988e90",
                    "surface-dim": "#121414",
                    "surface-container-lowest": "#0d0e0f",
                    "on-tertiary-fixed": "#1c1b1b",
                    "on-primary-container": "#757575",

                    "inverse-primary": "#5e5e5e",

                    "inverse-surface": "#e3e2e2",
                    "tertiary-fixed": "#e5e2e1",

            "borderRadius": {

            "spacing": {

                    "container-max-width": "1200px",

                    "base": "8px"
            },
            "fontFamily": {

<style>
      body {
        margin: 0;
        background-color: #121414;
        color: #e3e2e2;
        font-family: 'Metropolis', sans-serif;
      }
      .glass-container {
        background: rgba(18, 20, 20, 0.65);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      input:focus {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <!-- Background Layer -->
    <div class="fixed inset-0 z-0">
        <div class="w-full h-full bg-cover bg-center bg-no-repeat scale-105"
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBPK-71wt1z40SvgI-zmkeV7uprfNkezYGntG3Ku4gCfAoPjMA_XAAcR327VmkyDpE2yBxUAaQuw131mc-RqEZuNVI1xyz2M0VHQOkhoDXxHDBjaer4CR2mfVNIvFqwFakmuArFw_Ne_jeIRiC3RL6qdN8E5EShDAeqPXan_3d0SmPunKnCYQ3H9f3qcAOeyot20BhhQScZTJpayxCt5LPD_2bBuieeEadWoHs-AziB0LKGwx0DNUDH8MlEUkVsW43uDoloBb7fa-yN')">
        </div>
        <!-- Dark Overlay for Contrast -->
        <div class="absolute inset-0 bg-black/60 backdrop-brightness-50"></div>
    </div>
    <!-- Main Content Area -->
    <main class="relative z-10 flex min-h-screen items-center justify-center px-gutter py-12">
       <!--  Central Login Container -->
        <div class="glass-container w-full max-w-[420px] rounded-lg p-10 flex flex-col items-center animate-in fade-in zoom-in duration-700">
            <!-- Brand Section -->
            <div class="mb-10 text-center">
           <img alt="Navalha Logo" class="w-24 h-24 mb-4 mx-auto filter invert object-cover"
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_8Qt1FDHs-Vho0ZOFQeE_2cu_L07dNndECEsKQuvn5NADF02hXouDeFv0&amp;s=10">
                <h1 class="font-headline-lg text-headline-lg text-on-surface uppercase tracking-[0.2em]">NAVALHA</h1>
                <p class="font-label-sm text-label-sm text-on-surface-variant mt-2 tracking-widest">TRADITION &amp; PRECISION</p>
            </div>
            <!-- Login Form (Adicionado ID do form para o JS coletar) -->
            <form class="w-full space-y-6" id="formLogin">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="font-label-sm text-label-sm uppercase text-on-surface-variant block ml-1" for="email">E-mail</label>
                    <div class="relative">
                        <input class="w-full bg-surface-container-lowest border-none text-on-surface rounded-lg py-4 px-5 focus:ring-2 focus:ring-white transition-all duration-300 placeholder:text-on-tertiary-container font-body-md text-body-md"
                            id="email" placeholder="nome@email.com" required type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="font-label-sm text-label-sm uppercase text-on-surface-variant block" for="password">Senha</label>
                        <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-white transition-colors" href="#">Esqueci minha senha</a>
                    </div>
                    <div class="relative group">
                        <input class="w-full bg-surface-container-lowest border-none text-on-surface rounded-lg py-4 px-5 focus:ring-2 focus:ring-white transition-all duration-300 placeholder:text-on-tertiary-container font-body-md text-body-md"
                            id="password" placeholder="••••••••" required type="password" />
                        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors focus:outline-none"
                            onclick="togglePasswordVisibility()" type="button">
                            <span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Primary Action -->
                <div class="pt-4">
                    <button class="w-full bg-white text-black font-headline-md text-headline-md py-4 rounded-lg hover:bg-neutral-200 active:scale-[0.98] transition-all duration-200 uppercase tracking-wider"
                        type="submit">
                        ENTRAR
                    </button>
                </div>
                <!-- Secondary Action -->
                <div class="pt-4 text-center">
                    <p class="font-body-md text-body-md text-on-surface-variant">
                        Ainda não tem conta?
                        <a class="text-white font-bold hover:underline decoration-white/30 underline-offset-4 transition-all" href="Cadastro.html">Cadastre-se</a>
                    </p>
                </div>
            </form>
        </div>
    </main>
    <!-- Footer for Legal Navigation -->
    <footer class="fixed bottom-0 w-full z-10 px-gutter py-6 flex flex-col md:flex-row justify-between items-center opacity-60 hover:opacity-100 transition-opacity duration-300">
        <p class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-4 md:mb-0">© 2024 THE RITUAL BARBER CO.</p>
        <nav class="flex gap-8">
            <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Privacy</a>
            <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Terms</a>
            <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Location</a>
        </nav>
    </footer>
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach((input, index) => {
                input.style.transitionDelay = `${(index + 1) * 100}ms`;
            });
        });
    </script>
    <!-- Script de Integração com a API .NET -->
    <script src="js/auth.js"></script>
</body>
</html>
