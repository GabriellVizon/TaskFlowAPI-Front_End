    <!-- Código JavaScript Corrigido com os IDs exatos do seu HTML -->
    <script>
        // 1. Lógica do clique do formulário conectando na API .NET
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;

            btn.innerText = 'PROCESSANDO...';
            btn.classList.add('opacity-80');
            btn.disabled = true;

            // Certifique-se de que os termos dentro das aspas são exatamente os IDs do seu HTML:
            const nome = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('phone').value;
            const senha = document.getElementById('password').value;

            try {
                const resposta = await fetch('http://localhost:5089/api/Auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        senha: senha
                    })
                });

                if (resposta.ok) {
                    btn.innerText = 'CONTA CRIADA!';
                    btn.classList.add('bg-green-500', 'text-white');

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    const erroTxt = await resposta.text();
                    alert('Erro ao registrar no banco: ' + erroTxt);

                    btn.innerText = originalText;
                    btn.classList.remove('opacity-80');
                    btn.disabled = false;
                }
            } catch (erro) {
                console.error('Erro de conexão:', erro);
                alert('Não foi possível conectar na API .NET. Verifique se o servidor está ligado.');

                btn.innerText = originalText;
                btn.classList.remove('opacity-80');
                btn.disabled = false;
            }
        });

        // 2. Lógica visual do olhinho da senha
        const toggleBtn = document.querySelector('button .material-symbols-outlined');
        const passInput = document.getElementById('password');
        if (toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleBtn.innerText = isPass ? 'visibility_off' : 'visibility';
            });
        }
    </script>
